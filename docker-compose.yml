services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: timeforge-app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      - postgres
      - redis
    networks:
      - timeforge

  webserver:
    image: nginx:stable-alpine
    container_name: timeforge-webserver
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - timeforge

  frontend:
    image: node:20-alpine
    container_name: timeforge-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    networks:
      - timeforge

  postgres:
    image: postgres:16-alpine
    container_name: timeforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: timeforge
      POSTGRES_USER: timeforge
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - timeforge-postgres-data:/var/lib/postgresql/data
    networks:
      - timeforge

  redis:
    image: redis:7-alpine
    container_name: timeforge-redis
    ports:
      - "6379:6379"
    networks:
      - timeforge

volumes:
  timeforge-postgres-data:

networks:
  timeforge:
    driver: bridge
