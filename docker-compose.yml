services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: timeforge-app
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      - mysql
      - redis
    networks:
      - timeforge

  webserver:
    image: nginx:stable-alpine
    container_name: timeforge-webserver
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - timeforge

  frontend:
    image: node:20-alpine
    container_name: timeforge-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    networks:
      - timeforge

  mysql:
    image: mysql:8.0
    container_name: timeforge-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: timeforge
      MYSQL_USER: timeforge
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - timeforge-mysql-data:/var/lib/mysql
    networks:
      - timeforge

  redis:
    image: redis:7-alpine
    container_name: timeforge-redis
    ports:
      - "6379:6379"
    networks:
      - timeforge

volumes:
  timeforge-mysql-data:

networks:
  timeforge:
    driver: bridge
